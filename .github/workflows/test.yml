name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pip install -r requirements-dev.txt
      - name: Run Python tests
        shell: bash
        run: |
          set -o pipefail
          pytest -q 2>&1 | tee pytest-output.txt
      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics
          path: pytest-output.txt
          if-no-files-found: ignore
          retention-days: 7
      - run: python -m py_compile export_web.py run_live_export.py options_radar/live_scanners.py options_radar/strict_catalysts.py
      - run: node --check public/app.js
      - name: Validate JSON configuration
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          json.loads(Path('vercel.json').read_text(encoding='utf-8'))
          json.loads(Path('public/data/latest.json').read_text(encoding='utf-8'))
          json.loads(Path('data/company_aliases.json').read_text(encoding='utf-8'))
          print('JSON configuration is valid')
          PY
