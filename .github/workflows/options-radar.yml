name: GHAZI Stocks and Options Radar

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "export_web.py"
      - "run_live_export.py"
      - "options_radar/**"
      - "scripts/calibration_gate.py"
      - "data/universe.txt"
      - "data/company_aliases.json"
      - "requirements.txt"
      - ".github/workflows/options-radar.yml"
  schedule:
    # Minutes 07 and 37 reduce top-of-hour scheduling congestion.
    - cron: "7,37 13-21 * * 1-5"
    # Pre-session snapshot for the dashboard.
    - cron: "45 12 * * 1-5"

concurrency:
  group: ghazi-market-radar
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      OPTIONS_PROVIDER: ${{ secrets.OPTIONS_PROVIDER || 'auto' }}
      MARKETDATA_TOKEN: ${{ secrets.MARKETDATA_TOKEN }}
      TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}
      TRADIER_BASE_URL: ${{ secrets.TRADIER_BASE_URL }}
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_OPTIONS_FEED: ${{ secrets.ALPACA_OPTIONS_FEED }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || 'GHAZI Options Radar 207104176+GHAZMOTIEBIPRO@users.noreply.github.com' }}
      OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
      FREE_SWING_MODE: "true"
      MODEL_VERSION: "2026.07-phase2"
      MAX_UNIVERSE_SIZE: "120"
      CALIBRATION_MINIMUM_SAMPLE: "100"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -r requirements.txt
      - name: Generate dashboard data
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "schedule" && "${{ github.event.schedule }}" != "45 12 * * 1-5" ]]; then
            python run_live_export.py --top-stocks 15 --top-options 15 --skip-closed
          else
            python run_live_export.py --top-stocks 15 --top-options 15
          fi
      - name: Evaluate calibration review gate
        id: calibration_gate
        run: python scripts/calibration_gate.py
      - name: Open one-time calibration review issue
        if: steps.calibration_gate.outputs.should_open == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          existing_url="$(gh issue list --state open --search 'Calibration review ready in:title' --json url --jq '.[0].url // empty')"
          if [[ -n "$existing_url" ]]; then
            issue_url="$existing_url"
          else
            issue_url="$(gh issue create \
              --title "Calibration review ready — ${{ env.MODEL_VERSION }}" \
              --body-file data/live/CALIBRATION_REVIEW.md)"
          fi
          python scripts/calibration_gate.py --mark "$issue_url"
          echo "Calibration review issue: $issue_url"
      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path('public/data/latest.json').read_text(encoding='utf-8'))
          calibration = payload.get('calibration_gate', {})
          operations = payload.get('operational_status', {})
          summary = [
              '# GHAZI Market Radar',
              '',
              f"- Model: `{payload.get('model_version', 'unknown')}`",
              f"- Delivery: **dashboard only**",
              f"- Market: **{payload.get('market_regime', 'unknown')}**",
              f"- Stocks: **{payload.get('summary', {}).get('stock_candidates', 0)}**",
              f"- Options: **{payload.get('summary', {}).get('option_candidates', 0)}**",
              f"- Mature calibration sample: **{calibration.get('matured_sample', 0)}/{calibration.get('minimum_sample', 100)}**",
              f"- Raw priced signals: **{calibration.get('raw_priced_sample', 0)}**",
              f"- Five-day mature signals: **{calibration.get('five_day_sample', 0)}**",
              f"- Calibration ready: **{calibration.get('ready', False)}**",
              f"- Paper tracking ready: **{operations.get('ready_for_paper_tracking', False)}**",
          ]
          Path(os.environ['GITHUB_STEP_SUMMARY']).write_text('\n'.join(summary), encoding='utf-8')
          PY
      - name: Publish fresh dashboard data and evidence journal
        shell: bash
        run: |
          git config user.name "ghazi-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data/latest.json
          for file in \
            data/live/alert_state.json \
            data/live/signals.jsonl \
            data/live/outcomes.json \
            data/live/calibration.json \
            data/live/CALIBRATION_REVIEW.md \
            data/live/calibration_issue.json; do
            if [[ -f "$file" ]]; then
              git add "$file"
            fi
          done
          if git diff --cached --quiet; then
            echo "No data change to publish."
          else
            git commit -m "data: refresh market radar evidence [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
      - name: Upload result files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ghazi-market-radar-results
          retention-days: 14
          path: |
            public/data/latest.json
            data/live/*.json
            data/live/*.jsonl
            data/live/*.md
            results/*.csv
          if-no-files-found: ignore
