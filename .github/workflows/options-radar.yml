name: GHAZI Stocks and Options Radar

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "export_web.py"
      - "run_live_export.py"
      - "options_radar/**"
      - "data/universe.txt"
      - "data/company_aliases.json"
      - "requirements.txt"
      - ".github/workflows/options-radar.yml"
  schedule:
    # Minutes 07 and 37 reduce top-of-hour scheduling congestion.
    # The application skips holidays and times outside the NYSE regular session.
    - cron: "7,37 13-21 * * 1-5"
    # Daily summary before the US session (15:45 Riyadh).
    - cron: "45 12 * * 1-5"

concurrency:
  group: ghazi-market-radar
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      OPTIONS_PROVIDER: ${{ secrets.OPTIONS_PROVIDER || 'auto' }}
      MARKETDATA_TOKEN: ${{ secrets.MARKETDATA_TOKEN }}
      TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}
      TRADIER_BASE_URL: ${{ secrets.TRADIER_BASE_URL }}
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_OPTIONS_FEED: ${{ secrets.ALPACA_OPTIONS_FEED }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || 'GHAZI Options Radar 207104176+GHAZMOTIEBIPRO@users.noreply.github.com' }}
      OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
      FREE_SWING_MODE: "true"
      MODEL_VERSION: "2026.07-phase2"
      MAX_UNIVERSE_SIZE: "120"
      CALIBRATION_MINIMUM_SAMPLE: "100"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -r requirements.txt
      - name: Generate website data
        shell: bash
        run: |
          if [[ "${{ github.event.schedule }}" == "45 12 * * 1-5" ]]; then
            python run_live_export.py --top-stocks 15 --top-options 15 --send-alerts --send-report --send-email
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            python run_live_export.py --top-stocks 15 --top-options 15 --send-alerts --skip-closed
          else
            python run_live_export.py --top-stocks 15 --top-options 15 --send-alerts
          fi
      - name: Publish fresh dashboard data and evidence journal
        shell: bash
        run: |
          git config user.name "ghazi-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data/latest.json
          for file in data/live/alert_state.json data/live/signals.jsonl data/live/outcomes.json data/live/calibration.json; do
            if [[ -f "$file" ]]; then
              git add "$file"
            fi
          done
          if git diff --cached --quiet; then
            echo "No data change to publish."
          else
            git commit -m "data: refresh market radar evidence [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
      - name: Upload result files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ghazi-market-radar-results
          retention-days: 14
          path: |
            public/data/latest.json
            data/live/*.json
            data/live/*.jsonl
            results/*.csv
          if-no-files-found: ignore
